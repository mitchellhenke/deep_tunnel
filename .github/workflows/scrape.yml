name: Scrape MMSD Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      data_updated: ${{ steps.commit.outputs.data_updated }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: "mise.toml"
          version-type: "strict"

      - name: Run scraper
        run: elixir scrape.exs

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          if git diff --cached --quiet; then
            echo "data_updated=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update MMSD data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "data_updated=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: scrape
    if: needs.scrape.outputs.data_updated == 'true'
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.158.0

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: "mise.toml"
          version-type: "strict"

      - name: Generate chart data
        run: elixir generate_charts_data.exs

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Hugo
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Cache restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys:
            hugo-

      - name: Build the site
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Cache save
        id: cache-save
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
