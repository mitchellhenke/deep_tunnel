name: Scrape MMSD Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: "mise.toml"
          version-type: "strict"

      - name: Run scraper
        run: elixir scrape.exs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git diff --cached --quiet || (git commit -m "Update MMSD data $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
